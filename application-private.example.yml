app:
  llm-gateway:
    # Unified upstream LLM gateway base URL (must include /v1).
    base-url: https://api.ai.fun.tv/v1
    # Put real token here; do not commit application-private.yml.
    auth-token: replace-with-real-token
    auth-scheme: Bearer
    timeout-seconds: 120
    # false = always use auth-token from this config file.
    # true  = if incoming request has Authorization, forward it.
    prefer-incoming-authorization: false


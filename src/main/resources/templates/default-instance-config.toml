# fun-ai-claw default instance config template
# Please fill api_key / reliability.api_keys after instance creation.

api_key = ""
default_provider = "custom:https://api.ai.fun.tv/v1"
default_model = "MiniMax-M2.5"
default_temperature = 0.7

[[model_routes]]
hint = "mgc-novel-to-script"
provider = "custom:https://api.ai.fun.tv/v1"
model = "MiniMax-M2.5"

embedding_routes = []

[observability]
backend = "log"
runtime_trace_mode = "rolling"
runtime_trace_path = "state/runtime-trace.jsonl"
runtime_trace_max_entries = 500

[autonomy]
level = "full"
workspace_only = true
allowed_commands = [
    "git",
    "npm",
    "cargo",
    "ls",
    "cat",
    "grep",
    "find",
    "echo",
    "pwd",
    "wc",
    "head",
    "tail",
    "date",
]
forbidden_paths = [
    "/etc",
    "/root",
    "/home",
    "/usr",
    "/bin",
    "/sbin",
    "/lib",
    "/opt",
    "/boot",
    "/dev",
    "/proc",
    "/sys",
    "/var",
    "/tmp",
    "~/.ssh",
    "~/.gnupg",
    "~/.aws",
    "~/.config",
]
cli_excluded_tools = [
  "shell",
  "file_read",
  "file_write",
  "file_edit",
  "glob_search",
  "content_search",
  "cron_add",
  "cron_list",
  "cron_remove",
  "cron_update",
  "cron_run",
  "cron_runs",
  "memory_store",
  "memory_recall",
  "memory_forget",
  "schedule",
  "model_routing_config",
  "proxy_config",
  "git_operations",
  "pushover",
  "pdf_read",
  "screenshot",
  "image_info",
  "browser_open",
  "browser",
  "http_request",
  "web_fetch",
  "web_search_tool",
  "composio",
]
max_actions_per_hour = 1000000
max_cost_per_day_cents = 1000000000
require_approval_for_medium_risk = false
block_high_risk_commands = true
shell_env_passthrough = []
auto_approve = [
    "file_read",
    "memory_recall",
    "delegate"
]
always_ask = []
allowed_roots = []
non_cli_excluded_tools = []

[security.sandbox]
backend = "auto"
firejail_args = []

[security.resources]
max_memory_mb = 512
max_cpu_time_seconds = 60
max_subprocesses = 10
memory_monitoring = true

[security.audit]
enabled = true
log_path = "audit.log"
max_size_mb = 100
sign_events = false

[security.otp]
enabled = false
method = "totp"
token_ttl_secs = 30
cache_valid_secs = 300
gated_actions = [
    "shell",
    "file_write",
    "browser_open",
    "browser",
    "memory_forget",
]
gated_domains = []
gated_domain_categories = []

[security.estop]
enabled = false
state_file = "~/.zeroclaw/estop-state.json"
require_otp_to_resume = true

[runtime]
kind = "native"

[runtime.docker]
image = "alpine:3.20"
network = "none"
memory_limit_mb = 512
cpu_limit = 1.0
read_only_rootfs = true
mount_workspace = true
allowed_workspace_roots = []

[reliability]
provider_retries = 0
provider_backoff_ms = 500
fallback_providers = []
api_keys = []
channel_initial_backoff_secs = 2
channel_max_backoff_secs = 60
scheduler_poll_secs = 15
scheduler_retries = 2

[reliability.model_fallbacks]

[scheduler]
enabled = true
max_tasks = 64
max_concurrent = 4

[agent]
max_tool_iterations = 6
compact_context = true
max_history_messages = 25
parallel_tools = false
tool_dispatcher = "auto"

[skills]
prompt_injection_mode = "compact"
open_skills_enabled = true
open_skills_dir = "/workspace/agent-mgc-novel-script/skills"

[query_classification]
enabled = true

[[query_classification.rules]]
hint = "mgc-novel-to-script"
keywords = ["小说转剧本", "一句话剧本", "剧本", "分集大纲", "故事梗概", "角色设定"]
literals = ["script_type=", "expected_episode_count", "target_audience"]
priority = 100
min_length = 6
max_length = 4000

[heartbeat]
enabled = false
interval_minutes = 30

[cron]
enabled = true
max_run_history = 50

[channels_config]
cli = true
message_timeout_secs = 3000

[memory]
backend = "sqlite"
auto_save = true
hygiene_enabled = true
archive_after_days = 7
purge_after_days = 30
conversation_retention_days = 30
embedding_provider = "none"
embedding_model = "text-embedding-3-small"
embedding_dimensions = 1536
vector_weight = 0.7
keyword_weight = 0.3
min_relevance_score = 0.4
embedding_cache_size = 10000
chunk_max_tokens = 512
response_cache_enabled = false
response_cache_ttl_minutes = 60
response_cache_max_entries = 5000
snapshot_enabled = false
snapshot_on_hygiene = false
auto_hydrate = false

[storage.provider.config]
provider = ""
schema = "public"
table = "memories"

[tunnel]
provider = "none"

[gateway]
port = 42617
host = "0.0.0.0"
require_pairing = false
allow_public_bind = true
paired_tokens = []
pair_rate_limit_per_minute = 10
webhook_rate_limit_per_minute = 60
trust_forwarded_headers = false
rate_limit_max_keys = 10000
idempotency_ttl_secs = 300
idempotency_max_keys = 10000

[composio]
enabled = false
entity_id = "default"

[secrets]
encrypt = true

[browser]
enabled = false
allowed_domains = []
backend = "agent_browser"
native_headless = true
native_webdriver_url = "http://127.0.0.1:9515"

[browser.computer_use]
endpoint = "http://127.0.0.1:8787/v1/actions"
timeout_ms = 15000
allow_remote_endpoint = false
window_allowlist = []

[http_request]
enabled = false
allowed_domains = []
max_response_size = 1000000
timeout_secs = 30

[multimodal]
max_images = 4
max_image_size_mb = 5
allow_remote_fetch = false

[web_search]
enabled = false
provider = "duckduckgo"
max_results = 5
timeout_secs = 15

[proxy]
enabled = false
no_proxy = []
scope = "zeroclaw"
services = []

[identity]
format = "openclaw"

[cost]
enabled = false
daily_limit_usd = 10.0
monthly_limit_usd = 100.0
warn_at_percent = 80
allow_override = false

[peripherals]
enabled = false
boards = []

[agents."mgc-novel-to-script"]
provider = "custom:https://api.ai.fun.tv/v1"
model = "MiniMax-M2.5"
temperature = 0.3
system_prompt = """
你是 `mgc-novel-to-script` 执行代理。你不是聊天助手。

目标：按多轮交互状态推进剧本生成。默认 `interactive`，一轮只推进一个状态。

## 输入
必需字段：
- `script_type`
- `script_content`
- `target_audience`
- `expected_episode_count`

可选字段：
- `run_mode`：`interactive` | `strict`
- `interaction_action`：`start` | `confirm` | `revise`
- `stateId` / `state_id`
- `step_feedback` / `user_feedback` / `feedback`

支持 `key=value` 与 `key: value`；键名大小写不敏感；常见同义键要自动归一化。

`script_type` 仅允许：
- `小说转剧本`
- `一句话剧本`

否则只返回：
`{"error": true, "errorMessage": "错误原因说明"}`

## 固定状态
- `step1_input_parse`
- `step2_story_synopsis`
- `step3_character_profile`
- `step4_episode_outline`
- `step5_full_script`

## 交互规则
- `interaction_action` 缺失时按 `start` 处理。
- `start` 只能输出 `step1_input_parse`。
- `confirm` 的流转固定为：
  - `step1_input_parse` -> `step2_story_synopsis`
  - `step2_story_synopsis` -> `step3_character_profile`
  - `step3_character_profile` -> `step4_episode_outline`
  - `step4_episode_outline` -> `step5_full_script`
- `revise` 只能重生成当前 `stateId`。
- `revise` 缺少反馈内容时，只返回错误 JSON。
- `expected_episode_count` 在所有状态输出中必须一致。

## 输出规则
`interactive` 模式必须只输出：
1. `# 输入解析`
2. `# 当前状态`
3. `# 当前产出`
4. 紧跟在正文最后的 `<fun_claw_interaction>...</fun_claw_interaction>`

`strict` 模式可连续输出全部状态。

### `step1_input_parse` 压缩规则
- `step1_input_parse` 只用于输入校验与确认，不是创作阶段。
- `# 输入解析` 只保留归一化后的必需字段，使用短列表，禁止使用 Markdown 表格。
- `# 当前状态` 只保留 `stateId`、状态名称、当前进度三项，使用短列表，禁止展开说明。
- `# 当前产出` 只能给出简短确认摘要：
  - 1 行任务识别结果
  - 1 行题材 / 冲突摘要
- `step1_input_parse` 正文总长度必须尽量短，除交互协议块外，控制在约 6 行到 10 行内。
- `step1_input_parse` 严禁输出：
  - 剧名
  - 扩写版故事梗概
  - 人物命名与角色小传
  - 分集设计
  - 任何 Markdown 表格
  - “一句话剧本”或“小说转剧本”的正式创作正文

## 交互协议
- 协议块必须是正文最后一段。
- 协议块必须是合法 JSON。
- `actions[*].payload` 必须使用 `interaction_action` + `stateId`。
- `payload` 里的换行必须写成 JSON 转义后的 `\\n`，禁止把裸换行直接写进 JSON 字符串。
- 动作只允许：
  - `confirm`
  - `revise`

最小模板：

<fun_claw_interaction>
{
  "version": "1.0",
  "type": "approval_request",
  "stateId": "<当前状态ID>",
  "title": "请确认当前内容",
  "actions": [
    {
      "id": "confirm",
      "label": "确认并继续",
      "kind": "send",
      "payload": "interaction_action=confirm\\nstateId=<当前状态ID>"
    },
    {
      "id": "revise",
      "label": "提出修改",
      "kind": "prefill",
      "payload": "interaction_action=revise\\nstateId=<当前状态ID>\\nstep_feedback="
    }
  ]
}
</fun_claw_interaction>

## 严格禁止
- 禁止输出旧格式：
  - `user_confirm_required`
  - `next_step`
  - `[STEP_ID]`
  - `[STEP_STATUS]`
  - `[USER_CONFIRM_REQUIRED]`
  - “请回复确认第X步”
  - “第X步重生成”
- 禁止输出解释性前后缀、流程讲解、寒暄。
- 禁止绕过 `novel-to-script-main` 自行发挥。
"""
agentic = true
allowed_tools = [
    "novel-to-script-main",
    "novel-to-script-story-synopsis-generate",
    "novel-to-script-character-profile-generate",
    "novel-to-script-episode-outline-generate",
    "novel-to-script-full-script-generate",
    "one-line-script-story-synopsis-generate",
    "one-line-script-character-profile-generate",
    "one-line-script-episode-outline-generate",
    "one-line-script-full-script-generate",
]
max_iterations = 30
max_depth = 1

[hooks]
enabled = true

[hooks.builtin]
command_logger = true

[hardware]
enabled = false
transport = "None"
baud_rate = 115200
workspace_datasheets = false

[transcription]
enabled = false
api_url = "https://api.groq.com/openai/v1/audio/transcriptions"
model = "whisper-large-v3-turbo"
max_duration_secs = 120

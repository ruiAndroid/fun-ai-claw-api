server:
  port: 8080
  tomcat:
    threads:
      max: 400
      min-spare: 20
  error:
    include-message: always

logging:
  file:
    name: ${LOGGING_FILE_NAME:/data/fun-ai/logs/fun-ai-claw-api.log}
  logback:
    rollingpolicy:
      max-history: 7
      max-file-size: 100MB

spring:
  application:
    name: fun-ai-claw-api
  datasource:
    url: "jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/fun_ai_claw"
    username: "${DB_USER:funai_agent}"
    password: "${DB_PASSWORD:Ss123456!}"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
  sql:
    init:
      mode: always

app:
  cors:
    allowed-origins: https://studio.fun.tv
  open:
    allowed-origins: "*"
    auth:
      app-id-header: X-Open-App-Id
      app-secret-header: X-Open-App-Secret
    session:
      ws-token-ttl-seconds: 86400
      message-persistence-enabled: false
  plane:
    base-url: ${PLANE_BASE_URL:http://172.21.138.108:8090/internal/v1}
    requested-by: ${PLANE_REQUESTED_BY:fun-ai-claw-api}
    connect-timeout-seconds: ${PLANE_CONNECT_TIMEOUT_SECONDS:3}
    request-timeout-seconds: ${PLANE_REQUEST_TIMEOUT_SECONDS:90}
    ws-connect-timeout-seconds: ${PLANE_WS_CONNECT_TIMEOUT_SECONDS:10}
    ws-keepalive-seconds: ${PLANE_WS_KEEPALIVE_SECONDS:25}
  gateway:
    port-range-start: ${GATEWAY_PORT_RANGE_START:42617}
    port-range-end: ${GATEWAY_PORT_RANGE_END:42717}
    url-template: ${GATEWAY_URL_TEMPLATE:http://8.152.159.249/fun-claw/ui-controller/{instanceId}}
  remote-connect:
    command-template:  ${REMOTE_CONNECT_COMMAND_TEMPLATE:ssh root@172.21.138.108 "docker exec -it funclaw-{instanceId} /bin/busybox sh"}
  ui-controller:
    upstream-scheme: ${UI_CONTROLLER_UPSTREAM_SCHEME:http}
    upstream-host:  ${UI_CONTROLLER_UPSTREAM_HOST:172.21.138.108}
    request-timeout-seconds: ${UI_CONTROLLER_REQUEST_TIMEOUT_SECONDS:60}
    upstream-retry-attempts: ${UI_CONTROLLER_UPSTREAM_RETRY_ATTEMPTS:8}
    upstream-retry-delay-millis: ${UI_CONTROLLER_UPSTREAM_RETRY_DELAY_MILLIS:300}
  pairing-code:
    fixed-code: ""
    fixed-link-path: /
    auto-auth-query-param: autoAuth
    auth-token-query-param: authToken
  agent-guidance:
    # Preferred global fallback source on API host (optional).
    default-main-agents-md-path: /opt/fun-ai-claw-api/config/main-AGENTS.md
    # Inline fallback when file path is absent/unreadable (optional).
    default-main-agents-md: ""
    # Whether runtime sync should overwrite existing AGENTS.md in instance workspace.
    overwrite-on-start: true
    # Path shown to frontend and used by plane runtime writer inside container.
    instance-workspace-path: /zeroclaw-data/workspace/AGENTS.md
    # Protect DB/API from oversized prompts.
    max-bytes: 262144
  instance-config:
    default-config-toml-path: classpath:templates/default-instance-config.toml
    default-config-toml: ""
    overwrite-on-start: true
    runtime-config-path: /data/zeroclaw/config.toml
    max-bytes: 524288
  images:
    allow-custom-image: false
    presets:
      - id: zeroclaw-shell
        name: ZeroClaw Shell
        image: ${ZEROCLAW_PRESET_IMAGE_SHELL:${ZEROCLAW_PRESET_IMAGE:zeroclaw-shell:latest}}
        description: ZeroClaw image with shell support (gateway mode)
        recommended: true
      - id: zeroclaw-python
        name: ZeroClaw + Python
        image: ${ZEROCLAW_PRESET_IMAGE_PYTHON:zeroclaw-python:latest}
        description: ZeroClaw image with Python runtime
        recommended: false
      - id: zeroclaw-node
        name: ZeroClaw + Node.js
        image: ${ZEROCLAW_PRESET_IMAGE_NODE:zeroclaw-node:latest}
        description: ZeroClaw image with Node.js runtime
        recommended: false
      - id: zeroclaw-python-node
        name: ZeroClaw + Python + Node.js
        image: ${ZEROCLAW_PRESET_IMAGE_PYTHON_NODE:zeroclaw-python-node:latest}
        description: ZeroClaw image with Python and Node.js runtimes
        recommended: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
